    <style>
        body { margin: 0; background-color: #f8f9fa; display: flex; justify-content: center; font-family: sans-serif; }
        .page-container { position: relative; width: 100%; max-width: 1000px; line-height: 0; }
        .bg-img { width: 100%; height: auto; display: block; }
        .interactive-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 交互按钮样式 */
        .hit-box { 
            position: absolute; 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0); 
            transition: all 0.3s ease; 
            border-radius: 8px; 
            text-decoration: none; 
        }
        .hit-box:hover { 
            background: rgba(138, 145, 255, 0.1); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }

        /* 按钮定位（基于你主页大图的方块位置） */
        .btn-about { top: 68%; left: 7%; width: 15%; height: 20%; }
        .btn-video { top: 68%; left: 24%; width: 15%; height: 20%; }
        .btn-walk  { top: 68%; left: 41%; width: 15%; height: 20%; }
        .btn-comic { top: 68%; left: 58%; width: 15%; height: 20%; }
        .btn-mail  { top: 68%; left: 74%; width: 19%; height: 20%; }
    </style>
</head>
<body>

<div class="page-container">
    <img src="main_v2.jpg" class="bg-img">
    <div class="interactive-layer">
